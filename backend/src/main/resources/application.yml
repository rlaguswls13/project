spring:
  application:
    name: retrospective-backend
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:h2:mem:retrospective;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  github:
    api-base-url: https://api.github.com
    owner: ${APP_GITHUB_OWNER:rlaguswls13}
    repo: ${APP_GITHUB_REPO:project}
    token: ${APP_GITHUB_TOKEN:}
  copilot:
    enabled: ${APP_COPILOT_ENABLED:false}
    sdk-url: ${APP_COPILOT_SDK_URL:http://localhost:3001}
    model: ${APP_COPILOT_MODEL:auto}
  retrospective:
    zone: ${APP_TIME_ZONE:Asia/Seoul}
  seed:
    enabled: ${APP_SEED_SAMPLE_DATA:true}