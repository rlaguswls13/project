services:
  copilot-sdk:
    build:
      context: ../copilot-sdk-service
    environment:
      PORT: ${COPILOT_SDK_PORT:-3001}
      COPILOT_DEFAULT_MODEL: ${COPILOT_DEFAULT_MODEL:-auto}
      COPILOT_CLI_URL: ${COPILOT_CLI_URL:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_GITHUB_TOKEN:-}
    ports:
      - '3001:3001'
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      APP_GITHUB_OWNER: ${APP_GITHUB_OWNER:-}
      APP_GITHUB_REPO: ${APP_GITHUB_REPO:-}
      APP_GITHUB_TOKEN: ${APP_GITHUB_TOKEN:-}
      APP_COPILOT_ENABLED: ${APP_COPILOT_ENABLED:-false}
      APP_COPILOT_SDK_URL: ${APP_COPILOT_SDK_URL:-http://copilot-sdk:3001}
      APP_COPILOT_MODEL: ${APP_COPILOT_MODEL:-auto}
    ports:
      - '8080:8080'
    depends_on:
      - copilot-sdk
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:8080}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend
    restart: unless-stopped