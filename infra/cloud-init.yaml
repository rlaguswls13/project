#cloud-config
# Provisions a fresh Ubuntu 22.04 host for the retrospective stack:
# installs Docker Engine + Compose plugin, prepares the deploy directory,
# and writes a readiness marker that deploy.sh waits on.
package_update: true
packages:
  - ca-certificates
  - curl
  - gnupg
  - rsync

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker
  - bash -c 'usermod -aG docker "$(id -nu 1000)" || true'
  - mkdir -p /opt/retrospective
  - bash -c 'chown -R "$(id -nu 1000):$(id -ng 1000)" /opt/retrospective'
  - touch /opt/retrospective/.docker-ready
